<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>流动镶嵌模型 - 动态调控 | 双面表面蛋白 · 加长糖链 · 纯净图例</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }
        /* 控制面板：速度 + 独立开关 */
        .controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 15px 22px;
            color: white;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: auto;
            font-family: monospace;
            min-width: 210px;
        }
        .speed-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }
        .speed-row label {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] {
            width: 160px;
            cursor: pointer;
            background: #3a6ea5;
            height: 3px;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffaa66;
            cursor: pointer;
            border: none;
        }
        .speed-value {
            min-width: 45px;
            text-align: center;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 13px;
        }
        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #555;
            padding-top: 10px;
        }
        .switch-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .switch-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #4caf50;
        }
        /* 图例区域 - 只保留专业学名，无额外解释 */
        .legend {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 14px 20px;
            color: #eee;
            z-index: 200;
            font-size: 12px;
            border-right: 3px solid #4caf50;
            pointer-events: none;
            font-family: system-ui, sans-serif;
            min-width: 170px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            line-height: 1.5;
        }
        .legend h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            text-align: center;
            color: #ffdd99;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .color-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }
        .divider {
            height: 1px;
            background: #555;
            margin: 6px 0;
        }
        .legend-text {
            font-size: 12px;
        }
        #tooltip {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #ffd966;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            pointer-events: none;
            z-index: 200;
            border-left: 3px solid #ffaa44;
            font-family: monospace;
            max-width: 260px;
        }
        @media (max-width: 700px) {
            .legend { font-size: 10px; padding: 8px 12px; min-width: 130px; top: 70px; }
            .controls-panel { padding: 12px 16px; bottom: 15px; right: 15px; min-width: 180px; }
            .switch-row { gap: 12px; }
            .speed-row label { font-size: 12px; }
            input[type="range"] { width: 120px; }
            #tooltip { font-size: 10px; max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="legend">
        <h4>🧬 流动镶嵌模型</h4>
        <div class="legend-item"><div class="color-box" style="background: #e34d4d;"></div><span class="legend-text">磷脂亲水头部</span></div>
        <div class="legend-item"><div class="color-box" style="background: #ddbb77;"></div><span class="legend-text">磷脂疏水尾部</span></div>
        <div class="divider"></div>
        <div class="legend-item"><div class="color-box" style="background: #3a86ff;"></div><span class="legend-text">整合蛋白</span></div>
        <div class="legend-item"><div class="color-box" style="background: #6fbf73;"></div><span class="legend-text">表面蛋白</span></div>
        <div class="legend-item"><div class="color-box" style="background: #bf7fff;"></div><span class="legend-text">糖链</span></div>
    </div>
    <div class="controls-panel">
        <div class="speed-row">
            <span>🌀 膜流动性速度</span>
            <input type="range" id="speedSlider" min="0" max="1.8" step="0.01" value="1.0">
            <span id="speedValue" class="speed-value">1.00x</span>
        </div>
        <div class="switch-row">
            <div class="switch-item">
                <input type="checkbox" id="toggleLipids" checked> <span>🧴 磷脂运动</span>
            </div>
            <div class="switch-item">
                <input type="checkbox" id="toggleProteins" checked> <span>🧬 蛋白质运动</span>
            </div>
        </div>
    </div>
    <div id="tooltip">✨ 鼠标悬停任意蛋白质上查看详情<br>🔘 右侧面板可独立开关磷脂/蛋白运动</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 初始化场景 (无背景粒子) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 6, 14);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // --- 光照系统 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(-3, 2, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0x66aaff, 0.35);
        fillLight.position.set(4, 1, 3);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xaa88ff, 0.25);
        rimLight.position.set(0, -2, 0);
        scene.add(rimLight);
        
        // ========= 1. 磷脂双分子层 (距离拉近: 上层 +0.35，下层 -0.35) =========
        const upperLayerY = 0.35;
        const lowerLayerY = -0.35;
        const lipidRows = 26;
        const lipidCols = 26;
        const startX = -7.5;
        const startZ = -7.5;
        const step = 0.58;  // 紧密排列
        
        const headMaterialUp = new THREE.MeshStandardMaterial({ color: 0xe34d4d, roughness: 0.3, metalness: 0.1, emissive: 0x331100 });
        const headMaterialDown = new THREE.MeshStandardMaterial({ color: 0xe36b4d, roughness: 0.3, metalness: 0.1 });
        const tailMaterial = new THREE.MeshStandardMaterial({ color: 0xddbb77, roughness: 0.6, metalness: 0.05, transparent: true, opacity: 0.9 });
        
        // 创建弯曲尾部 (两节圆柱)
        function createCurvedTail(directionSign) {
            const segmentLen = 0.42;
            const radius = 0.09;
            const seg1 = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, segmentLen, 6), tailMaterial);
            const seg2 = new THREE.Mesh(new THREE.CylinderGeometry(radius*0.9, radius*0.9, segmentLen, 6), tailMaterial);
            seg1.castShadow = true;
            seg2.castShadow = true;
            const tailGroup = new THREE.Group();
            tailGroup.add(seg1);
            tailGroup.add(seg2);
            tailGroup.userData = {
                phase: Math.random() * Math.PI * 2,
                speed: 1.0 + Math.random() * 0.6,
                directionSign: directionSign,
                seg1: seg1,
                seg2: seg2
            };
            return tailGroup;
        }
        
        function createPhospholipid(yCenter, isUpperLayer, x, z) {
            const group = new THREE.Group();
            const headY = isUpperLayer ? yCenter + 0.48 : yCenter - 0.48;
            const headGeo = new THREE.SphereGeometry(0.28, 24, 24);
            const headMat = isUpperLayer ? headMaterialUp : headMaterialDown;
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.set(0, headY, 0);
            head.castShadow = true;
            group.add(head);
            
            const directionSign = isUpperLayer ? -1 : 1;
            const baseYOffset = directionSign * 0.24;
            const tail1Group = createCurvedTail(directionSign);
            tail1Group.position.set(-0.2, headY + baseYOffset, 0.12);
            const tail2Group = createCurvedTail(directionSign);
            tail2Group.position.set(0.2, headY + baseYOffset, -0.1);
            group.add(tail1Group);
            group.add(tail2Group);
            
            group.userData = {
                originalX: x,
                originalY: yCenter,
                originalZ: z,
                isUpper: isUpperLayer,
                tailLeft: tail1Group,
                tailRight: tail2Group
            };
            group.position.set(x, yCenter, z);
            return group;
        }
        
        const phospholipidGroups = [];
        for (let i = 0; i < lipidRows; i++) {
            for (let j = 0; j < lipidCols; j++) {
                const x = startX + i * step;
                const z = startZ + j * step;
                if (Math.abs(x) < 8.0 && Math.abs(z) < 8.0) {
                    const upperLipid = createPhospholipid(upperLayerY, true, x, z);
                    const lowerLipid = createPhospholipid(lowerLayerY, false, x, z);
                    scene.add(upperLipid);
                    scene.add(lowerLipid);
                    phospholipidGroups.push(upperLipid, lowerLipid);
                }
            }
        }
        
        // ========= 2. 蛋白质 =========
        // 整合蛋白材料
        const integralMat = new THREE.MeshStandardMaterial({ color: 0x3a86ff, metalness: 0.45, roughness: 0.3, emissive: 0x001844 });
        // 紫色糖链材质 (加长、突出)
        const glycanMat = new THREE.MeshStandardMaterial({ color: 0xbf7fff, emissive: 0x331166, roughness: 0.2 });
        
        // 创建整合蛋白 (贯穿型)，糖链加长且完全突出于膜外侧
        function createIntegralProtein(x, z, hasGlycan = false) {
            const group = new THREE.Group();
            const cylinderGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.85, 14);
            const cylinder = new THREE.Mesh(cylinderGeo, integralMat);
            cylinder.position.y = 0;
            cylinder.castShadow = true;
            group.add(cylinder);
            const capMat = new THREE.MeshStandardMaterial({ color: 0x66aaff });
            const topCap = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), capMat);
            topCap.position.y = 0.48;
            group.add(topCap);
            const bottomCap = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), capMat);
            bottomCap.position.y = -0.48;
            group.add(bottomCap);
            group.position.set(x, 0, z);
            group.userData = { 
                type: 'integral', 
                name: '整合蛋白', 
                desc: '贯穿整个磷脂双分子层，占膜蛋白70%-80%' 
            };
            
            // 糖链加长，完全在膜外侧 (Y > 0.95)，且链长增加，使用圆柱连接形成长链状
            if (hasGlycan) {
                const glycanOuter = new THREE.Group();
                // 构建树状长链：从蛋白顶部向外延伸，多个小球和连接杆
                const startPos = new THREE.Vector3(0.5, 0.85, 0.3);
                const points = [
                    { pos: [0.65, 1.05, 0.45], size: 0.22 },
                    { pos: [0.85, 1.35, 0.65], size: 0.21 },
                    { pos: [1.05, 1.60, 0.85], size: 0.20 },
                    { pos: [1.30, 1.85, 1.05], size: 0.22 },
                    { pos: [1.55, 2.05, 1.30], size: 0.24 }  // 最长延伸
                ];
                points.forEach(p => {
                    const sugar = new THREE.Mesh(new THREE.SphereGeometry(p.size, 16, 16), glycanMat);
                    sugar.position.set(p.pos[0], p.pos[1], p.pos[2]);
                    sugar.castShadow = true;
                    glycanOuter.add(sugar);
                });
                // 额外分支糖链
                const branchPoints = [
                    [-0.65, 1.10, -0.55], [-0.90, 1.45, -0.75], [-1.10, 1.70, -0.95],
                    [0.20, 1.25, 0.85], [0.45, 1.55, 1.10]
                ];
                branchPoints.forEach(pos => {
                    const sugar = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), glycanMat);
                    sugar.position.set(pos[0], pos[1], pos[2]);
                    glycanOuter.add(sugar);
                });
                group.add(glycanOuter);
                group.userData.name = '糖蛋白 (整合蛋白+糖链)';
                group.userData.desc = '贯穿型整合蛋白，加长紫色糖链突出于细胞膜外表面';
            }
            return group;
        }
        
        // 表面蛋白 (附着在膜的内表面或外表面，无多余小球)
        const peripheralMat = new THREE.MeshStandardMaterial({ color: 0x6fbf73, metalness: 0.1, roughness: 0.45, emissive: 0x226622 });
        function createPeripheralProtein(x, z, isOuter = false) {
            const group = new THREE.Group();
            // 只保留多面体主体，无额外小球
            const bodyGeo = new THREE.DodecahedronGeometry(0.44);
            const body = new THREE.Mesh(bodyGeo, peripheralMat);
            body.castShadow = true;
            group.add(body);
            const yPos = isOuter ? 0.85 : -0.72;  // 外表面附着在上层磷脂头部区域，内表面在下层
            group.position.set(x, yPos, z);
            group.userData = {
                type: 'peripheral',
                name: isOuter ? '表面蛋白 (外表面)' : '表面蛋白 (内表面)',
                desc: isOuter ? '附着在细胞膜外表面，参与细胞识别与信号接收' : '附着在细胞膜内表面（细胞质侧），参与信号转导'
            };
            return group;
        }
        
        // 生成蛋白质：总数32，整合蛋白24（其中9个带糖链），表面蛋白8个（内外各4个），零散分布
        const totalProteins = 32;
        const integralTarget = 24;
        const peripheralTarget = 8;
        const glycanOnIntegral = 9;
        const proteinsList = [];
        
        function isTooClose(x, z, positions, minDist = 1.0) {
            for (let pos of positions) {
                const dx = pos.x - x;
                const dz = pos.z - z;
                if (Math.sqrt(dx*dx + dz*dz) < minDist) return true;
            }
            return false;
        }
        
        function generateScatteredPosition(existingPositions, bound = 5.8, minDist = 1.0) {
            let attempts = 0;
            while (attempts < 400) {
                const x = (Math.random() - 0.5) * bound * 2;
                const z = (Math.random() - 0.5) * bound * 2;
                if (Math.abs(x) < bound && Math.abs(z) < bound && !isTooClose(x, z, existingPositions, minDist)) {
                    return { x, z };
                }
                attempts++;
            }
            return { x: (Math.random() - 0.5) * 10, z: (Math.random() - 0.5) * 10 };
        }
        
        const integralPositions = [];
        for (let i = 0; i < integralTarget; i++) {
            const pos = generateScatteredPosition(integralPositions, 5.8, 0.95);
            integralPositions.push(pos);
        }
        // 表面蛋白位置 (内外各半)
        const peripheralPositionsOuter = [];
        const peripheralPositionsInner = [];
        for (let i = 0; i < peripheralTarget/2; i++) {
            const pos = generateScatteredPosition([...integralPositions, ...peripheralPositionsOuter, ...peripheralPositionsInner], 5.8, 0.95);
            peripheralPositionsOuter.push(pos);
            const pos2 = generateScatteredPosition([...integralPositions, ...peripheralPositionsOuter, ...peripheralPositionsInner], 5.8, 0.95);
            peripheralPositionsInner.push(pos2);
        }
        
        let glycanAssigned = 0;
        for (let i = 0; i < integralPositions.length; i++) {
            const pos = integralPositions[i];
            const hasGlycan = (glycanAssigned < glycanOnIntegral);
            const protein = createIntegralProtein(pos.x, pos.z, hasGlycan);
            scene.add(protein);
            proteinsList.push(protein);
            if (hasGlycan) glycanAssigned++;
        }
        for (let pos of peripheralPositionsOuter) {
            const protein = createPeripheralProtein(pos.x, pos.z, true);
            scene.add(protein);
            proteinsList.push(protein);
        }
        for (let pos of peripheralPositionsInner) {
            const protein = createPeripheralProtein(pos.x, pos.z, false);
            scene.add(protein);
            proteinsList.push(protein);
        }
        
        // ========= 动画数据 =========
        const lipidDynamicData = phospholipidGroups.map(group => ({
            group: group,
            originalY: group.userData.originalY,
            originalX: group.userData.originalX,
            originalZ: group.userData.originalZ,
            tailLeft: group.userData.tailLeft,
            tailRight: group.userData.tailRight
        }));
        
        const dynamicProteins = [];
        proteinsList.forEach(protein => {
            let speedX = (Math.random() - 0.5) * 0.0055;
            let speedZ = (Math.random() - 0.5) * 0.0055;
            let fixedY = null;
            if (protein.userData.type === 'integral') fixedY = 0;
            else if (protein.userData.name.includes('外表面')) fixedY = 0.85;
            else if (protein.userData.name.includes('内表面')) fixedY = -0.72;
            dynamicProteins.push({
                mesh: protein,
                baseSpeedX: speedX,
                baseSpeedZ: speedZ,
                speedX: speedX,
                speedZ: speedZ,
                boundX: 6.0,
                boundZ: 6.0,
                fixedY: fixedY,
                rotSpeed: 0.005 + Math.random() * 0.008
            });
        });
        
        // ========= 独立控制开关 =========
        const toggleLipids = document.getElementById('toggleLipids');
        const toggleProteins = document.getElementById('toggleProteins');
        let lipidsEnabled = true;
        let proteinsEnabled = true;
        toggleLipids.addEventListener('change', (e) => { lipidsEnabled = e.target.checked; });
        toggleProteins.addEventListener('change', (e) => { proteinsEnabled = e.target.checked; });
        
        // 速度控制
        const speedSlider = document.getElementById('speedSlider');
        const speedValueSpan = document.getElementById('speedValue');
        let globalSpeed = 1.0;
        function updateSpeed() {
            globalSpeed = parseFloat(speedSlider.value);
            speedValueSpan.innerText = globalSpeed.toFixed(2) + 'x';
            dynamicProteins.forEach(obj => {
                obj.speedX = obj.baseSpeedX * globalSpeed;
                obj.speedZ = obj.baseSpeedZ * globalSpeed;
            });
        }
        speedSlider.addEventListener('input', updateSpeed);
        updateSpeed();
        
        // --- 鼠标悬浮交互 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltipDiv = document.getElementById('tooltip');
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(proteinsList, true);
            if (intersects.length > 0) {
                let hit = intersects[0].object;
                while (hit && !hit.userData?.name && hit.parent) hit = hit.parent;
                if (hit && hit.userData && hit.userData.name) {
                    tooltipDiv.innerHTML = `🧪 <strong style="color:#ffaa66">${hit.userData.name}</strong><br>${hit.userData.desc || ''}`;
                    if (hit.material && !hit.userData._backupEmissive) {
                        hit.userData._backupEmissive = hit.material.emissiveIntensity || 0;
                        hit.material.emissiveIntensity = 0.5;
                        setTimeout(() => {
                            if (hit.material) hit.material.emissiveIntensity = hit.userData._backupEmissive || 0;
                        }, 250);
                    }
                } else {
                    tooltipDiv.innerHTML = `🔬 膜蛋白组件<br>鼠标悬停查看详情`;
                }
            } else {
                tooltipDiv.innerHTML = `✨ 鼠标悬停任意蛋白质上查看详情<br>🔘 右侧面板可独立开关磷脂/蛋白运动`;
                proteinsList.forEach(p => {
                    if (p.material && p.userData._backupEmissive !== undefined) {
                        p.material.emissiveIntensity = p.userData._backupEmissive;
                    }
                });
            }
        });
        
        // ========= 动画循环 =========
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016 * globalSpeed;
            
            // 磷脂动态
            if (lipidsEnabled) {
                lipidDynamicData.forEach(data => {
                    const { group, originalY, originalX, originalZ, tailLeft, tailRight } = data;
                    const wave1 = Math.sin(time * 1.4 + originalX * 1.1 + originalZ * 0.9) * 0.045;
                    const wave2 = Math.cos(time * 1.2 + originalZ * 1.0 - originalX * 0.7) * 0.04;
                    group.position.y = originalY + (wave1 + wave2) * 0.6;
                    
                    if (tailLeft && tailRight) {
                        const swing = Math.sin(time * 2.4 + originalX * 1.3 + originalZ) * 0.55 * Math.min(globalSpeed, 1.5);
                        const swing2 = Math.cos(time * 2.0 + originalZ * 1.1) * 0.4 * Math.min(globalSpeed, 1.5);
                        tailLeft.children[0].rotation.z = swing * 0.9;
                        tailLeft.children[0].rotation.x = swing2 * 0.6;
                        tailLeft.children[1].rotation.z = swing * 1.3;
                        tailLeft.children[1].rotation.x = swing2 * 0.8;
                        tailRight.children[0].rotation.z = -swing * 0.9;
                        tailRight.children[0].rotation.x = swing2 * 0.6;
                        tailRight.children[1].rotation.z = -swing * 1.2;
                        tailRight.children[1].rotation.x = swing2 * 0.8;
                    }
                });
            }
            
            // 蛋白质运动
            if (proteinsEnabled) {
                dynamicProteins.forEach(obj => {
                    const mesh = obj.mesh;
                    let newX = mesh.position.x + obj.speedX;
                    let newZ = mesh.position.z + obj.speedZ;
                    if (newX > obj.boundX) { newX = obj.boundX - (newX - obj.boundX); obj.speedX *= -1; }
                    if (newX < -obj.boundX) { newX = -obj.boundX - (newX + obj.boundX); obj.speedX *= -1; }
                    if (newZ > obj.boundZ) { newZ = obj.boundZ - (newZ - obj.boundZ); obj.speedZ *= -1; }
                    if (newZ < -obj.boundZ) { newZ = -obj.boundZ - (newZ + obj.boundZ); obj.speedZ *= -1; }
                    mesh.position.x = newX;
                    mesh.position.z = newZ;
                    if (obj.fixedY !== null) mesh.position.y = obj.fixedY;
                    mesh.rotation.y += obj.rotSpeed * (0.8 + globalSpeed * 0.4);
                    mesh.rotation.x = Math.sin(time * 0.8) * 0.04;
                });
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('最终模型 | 表面蛋白内外均有 | 加长糖链 | 图例纯净 | 无多余小球');
    </script>
</body>
